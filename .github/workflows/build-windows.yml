name: Build Windows 64-bit

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.84.0 flet-cli==0.84.0 flet-desktop==0.84.0
          pip install yt-dlp==2026.3.17
          pip install pyinstaller==6.20.0 pyinstaller-hooks-contrib==2026.5
          pip install requests==2.34.2 urllib3==2.7.0 rich==15.0.0
        shell: pwsh

      - name: Descargar ffmpeg
        shell: python
        run: |
          import urllib.request, zipfile, os, tempfile
          os.makedirs('assets/bin', exist_ok=True)
          url = 'https://github.com/yt-dlp/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip'
          tmp = os.path.join(tempfile.gettempdir(), 'ffmpeg.zip')
          print('Descargando ffmpeg...')
          urllib.request.urlretrieve(url, tmp)
          with zipfile.ZipFile(tmp) as z:
              for n in z.namelist():
                  if n.endswith('bin/ffmpeg.exe') or n.endswith('bin/ffprobe.exe'):
                      exe = os.path.basename(n)
                      with z.open(n) as s, open(os.path.join('assets','bin',exe), 'wb') as d:
                          d.write(s.read())
                      print(f'  {exe}: OK')

      - name: Empaquetar con flet pack --onedir
        run: >
          flet pack main.py
          --name Descargador_Win64
          --distpath dist
          --icon assets/logo_POD.ico
          --add-data "assets;assets"
          --hidden-import yt_dlp
          --hidden-import yt_dlp.extractor
          --hidden-import yt_dlp.postprocessor
          --product-name "Descargador de Videos POD"
          --product-version "2.0.0"
          --file-version "2.0.0"
          --company-name "Proyecto Ola Digital"
          --copyright "2026 Proyecto Ola Digital"
          --file-description "Descargador de Videos - Proyecto Ola Digital"
          --no-onefile
        shell: pwsh

      - name: Comprimir carpeta completa
        run: |
          Compress-Archive -Path dist/Descargador_Win64 -DestinationPath dist/Descargador_Win64.zip
        shell: pwsh

      - name: Subir artifact
        uses: actions/upload-artifact@v4
        with:
          name: Descargador_Win64
          path: dist/Descargador_Win64.zip

      - name: Publicar Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Descargador_Win64.zip