name: Build Windows 64-bit

on:
  workflow_dispatch:        # Se lanza manualmente desde la pestaña Actions
  push:
    tags:
      - 'v*'               # También se lanza al hacer push de un tag como v2.1

jobs:
  build:
    runs-on: windows-latest   # Máquina Windows limpia real en GitHub

    steps:
      # 1. Clonar el repositorio
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Instalar Python 3.12
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.84.0 flet-cli==0.84.0 flet-desktop==0.84.0
          pip install yt-dlp==2026.3.17
          pip install pyinstaller==6.20.0 pyinstaller-hooks-contrib==2026.5
          pip install requests==2.34.2 urllib3==2.7.0 rich==15.0.0

      # 4. Descargar ffmpeg oficial de yt-dlp y colocarlo en assets/bin/
      - name: Descargar ffmpeg
        run: |
          mkdir -p assets/bin
          python - <<'EOF'
          import urllib.request, zipfile, os, tempfile
          url = 'https://github.com/yt-dlp/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip'
          tmp = tempfile.gettempdir() + '/ffmpeg.zip'
          print('Descargando ffmpeg...')
          urllib.request.urlretrieve(url, tmp)
          print('Extrayendo...')
          with zipfile.ZipFile(tmp) as z:
              for n in z.namelist():
                  if n.endswith('bin/ffmpeg.exe') or n.endswith('bin/ffprobe.exe'):
                      exe = os.path.basename(n)
                      with z.open(n) as s, open(f'assets/bin/{exe}', 'wb') as d:
                          d.write(s.read())
                      print(f'  {exe}: OK')
          EOF

      # 5. Empaquetar con flet pack (incluye runtime Flutter automáticamente)
      - name: Empaquetar con flet pack
        run: |
          flet pack main.py `
            --name Descargador_Win64 `
            --distpath dist `
            --icon assets/logo_POD.ico `
            --add-data "assets;assets" `
            --hidden-import yt_dlp `
            --hidden-import yt_dlp.extractor `
            --hidden-import yt_dlp.postprocessor `
            --product-name "Descargador de Videos POD" `
            --product-version "2.0.0" `
            --file-version "2.0.0" `
            --company-name "Proyecto Ola Digital" `
            --copyright "2026 Proyecto Ola Digital" `
            --file-description "Descargador de Videos - Proyecto Ola Digital"

      # 6. Comprimir el ejecutable en zip
      - name: Crear zip
        run: |
          cd dist
          Compress-Archive -Path Descargador_Win64.exe -DestinationPath Descargador_Win64.zip

      # 7. Subir el zip como artifact descargable desde Actions
      - name: Subir artifact
        uses: actions/upload-artifact@v4
        with:
          name: Descargador_Win64
          path: dist/Descargador_Win64.zip

      # 8. Si se hizo push de un tag, publicar como Release automáticamente
      - name: Publicar Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Descargador_Win64.zip