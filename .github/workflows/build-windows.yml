name: Build Windows 64-bit

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install flet==0.84.0 flet-cli==0.84.0 flet-desktop==0.84.0
          pip install yt-dlp==2026.3.17
          pip install pyinstaller==6.20.0 pyinstaller-hooks-contrib==2026.5
          pip install requests==2.34.2 urllib3==2.7.0 rich==15.0.0
        shell: pwsh

      - name: Descargar ffmpeg
        shell: python
        run: |
          import urllib.request, zipfile, os, tempfile
          os.makedirs('assets/bin', exist_ok=True)
          url = 'https://github.com/yt-dlp/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip'
          tmp = os.path.join(tempfile.gettempdir(), 'ffmpeg.zip')
          print('Descargando ffmpeg...')
          urllib.request.urlretrieve(url, tmp)
          with zipfile.ZipFile(tmp) as z:
              for n in z.namelist():
                  if n.endswith('bin/ffmpeg.exe') or n.endswith('bin/ffprobe.exe'):
                      exe = os.path.basename(n)
                      with z.open(n) as s, open(os.path.join('assets','bin',exe), 'wb') as d:
                          d.write(s.read())
                      print(f'  {exe}: OK')

      - name: Pre-cachear runtime Flet y empaquetar
        shell: python
        run: |
          import urllib.request, zipfile, os, tempfile, sys, subprocess

          # 1. Descargar y cachear el runtime de Flet
          flet_cache = os.path.join(os.path.expanduser('~'), '.flet', 'client',
                                    'flet-desktop-full-0.84.0', 'flet')
          os.makedirs(flet_cache, exist_ok=True)
          if not os.listdir(flet_cache):
              url = 'https://github.com/flet-dev/flet/releases/download/v0.84.0/flet-windows.zip'
              tmp = os.path.join(tempfile.gettempdir(), 'flet-windows.zip')
              print('Descargando runtime Flet...')
              urllib.request.urlretrieve(url, tmp)
              with zipfile.ZipFile(tmp) as z:
                  z.extractall(flet_cache)
              print(f'Runtime extraido: {os.listdir(flet_cache)[:5]}')

          # 2. Parchear flet_cli para que NO borre el directorio temporal
          import flet_cli.__pyinstaller.config as hook_config
          _orig_rmtree = None
          import shutil
          _orig_rmtree = shutil.rmtree
          def _no_rmtree(path, **kwargs):
              if hook_config.temp_bin_dir and path == hook_config.temp_bin_dir:
                  print(f'[PATCH] Evitando borrado de: {path}')
                  return
              _orig_rmtree(path, **kwargs)
          shutil.rmtree = _no_rmtree

          # 3. Llamar flet pack via subprocess con el entorno parcheado
          # (el parche solo aplica en este proceso, flet pack corre en subproceso)
          # Mejor: usar copy_flet_bin directamente y luego PyInstaller
          from flet_cli.__pyinstaller.utils import copy_flet_bin, get_flet_bin_path
          print('Copiando flet bin...')
          bin_path = copy_flet_bin()
          print(f'flet bin copiado en: {bin_path}')
          hook_config.temp_bin_dir = bin_path

          import PyInstaller.__main__
          pyi_args = [
              'main.py', '--noconfirm', '--noconsole',
              '--icon', 'assets/logo_POD.ico',
              '--name', 'Descargador_Win64',
              '--distpath', 'dist',
              '--add-data', 'assets;assets',
              '--hidden-import', 'yt_dlp',
              '--hidden-import', 'yt_dlp.extractor',
              '--hidden-import', 'yt_dlp.postprocessor',
              '--onefile',
          ]
          print('Ejecutando PyInstaller...')
          PyInstaller.__main__.run(pyi_args)
          print('Build completado.')

      - name: Crear zip
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Compress-Archive -Path dist/Descargador_Win64.exe -DestinationPath dist/Descargador_Win64.zip
        shell: pwsh

      - name: Subir artifact
        uses: actions/upload-artifact@v4
        with:
          name: Descargador_Win64
          path: dist/Descargador_Win64.zip

      - name: Publicar Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Descargador_Win64.zip